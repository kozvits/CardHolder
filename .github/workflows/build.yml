        </androidx.cardview.widget.CardView>
        EOF

    - name: Create Kotlin Source Files
      run: |
        cat > app/src/main/java/com/example/nfccardmanager/data/Card.kt << 'EOF'
        package com.example.nfccardmanager.data

        import androidx.room.Entity
        import androidx.room.PrimaryKey

        @Entity(tableName = "cards")
        data class Card(
            @PrimaryKey(autoGenerate = true)
            val id: Int = 0,
            val uid: String,
            val type: String,
            val data: ByteArray,
            val timestamp: Long = System.currentTimeMillis()
        ) {
            override fun equals(other: Any?): Boolean {
                if (this === other) return true
                if (javaClass != other?.javaClass) return false
                other as Card
                if (id != other.id) return false
                if (uid != other.uid) return false
                if (type != other.type) return false
                if (!data.contentEquals(other.data)) return false
                if (timestamp != other.timestamp) return false
                return true
            }

            override fun hashCode(): Int {
                var result = id
                result = 31 * result + uid.hashCode()
                result = 31 * result + type.hashCode()
                result = 31 * result + data.contentHashCode()
                result = 31 * result + timestamp.hashCode()
                return result
            }
        }
        EOF

        cat > app/src/main/java/com/example/nfccardmanager/data/CardDao.kt << 'EOF'
        package com.example.nfccardmanager.data

        import androidx.room.*
        import kotlinx.coroutines.flow.Flow

        @Dao
        interface CardDao {
            @Query("SELECT * FROM cards")
            fun getAllCards(): Flow<List<Card>>

            @Query("SELECT * FROM cards WHERE uid = :uid LIMIT 1")
            suspend fun getCardByUid(uid: String): Card?

            @Insert(onConflict = OnConflictStrategy.IGNORE)
            suspend fun insert(card: Card): Long

            @Delete
            suspend fun delete(card: Card)

            @Update
            suspend fun update(card: Card)
        }
        EOF

        cat > app/src/main/java/com/example/nfccardmanager/data/CardDatabase.kt << 'EOF'
        package com.example.nfccardmanager.data

        import android.content.Context
        import androidx.room.Database
        import androidx.room.Room
        import androidx.room.RoomDatabase

        @Database(entities = [Card::class], version = 1, exportSchema = false)
        abstract class CardDatabase : RoomDatabase() {
            abstract fun cardDao(): CardDao

            companion object {
                @Volatile
                private var INSTANCE: CardDatabase? = null

                fun getDatabase(context: Context): CardDatabase {
                    return INSTANCE ?: synchronized(this) {
                        val instance = Room.databaseBuilder(
                            context.applicationContext,
                            CardDatabase::class.java,
                            "card_database"
                        ).build()
                        INSTANCE = instance
                        instance
                    }
                }
            }
        }
        EOF

    - name: Create Repository and ViewModel
      run: |
        cat > app/src/main/java/com/example/nfccardmanager/repository/CardRepository.kt << 'EOF'
        package com.example.nfccardmanager.repository

        import com.example.nfccardmanager.data.Card
        import com.example.nfccardmanager.data.CardDao
        import kotlinx.coroutines.Dispatchers
        import kotlinx.coroutines.flow.Flow
        import kotlinx.coroutines.withContext

        class CardRepository(private val cardDao: CardDao) {
            val allCards: Flow<List<Card>> = cardDao.getAllCards()

            suspend fun getCardByUid(uid: String): Card? = withContext(Dispatchers.IO) {
                cardDao.getCardByUid(uid)
            }

            suspend fun insert(card: Card): Long = withContext(Dispatchers.IO) {
                cardDao.insert(card)
            }

            suspend fun delete(card: Card) = withContext(Dispatchers.IO) {
                cardDao.delete(card)
            }
        }
        EOF

        cat > app/src/main/java/com/example/nfccardmanager/viewmodel/CardViewModel.kt << 'EOF'
        package com.example.nfccardmanager.viewmodel

        import android.app.Application
        import androidx.lifecycle.AndroidViewModel
        import androidx.lifecycle.viewModelScope
        import com.example.nfccardmanager.data.Card
        import com.example.nfccardmanager.data.CardDatabase
        import com.example.nfccardmanager.repository.CardRepository
        import kotlinx.coroutines.flow.Flow
        import kotlinx.coroutines.launch

        class CardViewModel(application: Application) : AndroidViewModel(application) {
            private val repository: CardRepository

            init {
                val cardDao = CardDatabase.getDatabase(application).cardDao()
                repository = CardRepository(cardDao)
            }

            val allCards: Flow<List<Card>> = repository.allCards

            fun insert(card: Card) = viewModelScope.launch {
                repository.insert(card)
            }

            fun delete(card: Card) = viewModelScope.launch {
                repository.delete(card)
            }
        }
        EOF

    - name: Create HCE and Adapter
      run: |
        cat > app/src/main/java/com/example/nfccardmanager/hce/CardEmulationService.kt << 'EOF'
        package com.example.nfccardmanager.hce

        import android.nfc.cardemulation.HostApduService
        import android.os.Bundle
        import android.util.Log

        class CardEmulationService : HostApduService() {
            companion object {
                private const val TAG = "CardEmulationService"
                var emulatedCardData: ByteArray? = null
            }

            override fun processCommandApdu(commandApdu: ByteArray, extras: Bundle?): ByteArray {
                Log.d(TAG, "Received APDU")
                emulatedCardData?.let {
                    return it + byteArrayOf(0x90.toByte(), 0x00.toByte())
                }
                return byteArrayOf(0x6A.toByte(), 0x82.toByte())
            }

            override fun onDeactivated(reason: Int) {
                Log.d(TAG, "Card emulation deactivated")
            }
        }
        EOF

        cat > app/src/main/java/com/example/nfccardmanager/adapter/CardAdapter.kt << 'EOF'
        package com.example.nfccardmanager.adapter

        import android.view.LayoutInflater
        import android.view.ViewGroup
        import androidx.recyclerview.widget.DiffUtil
        import androidx.recyclerview.widget.ListAdapter
        import androidx.recyclerview.widget.RecyclerView
        import com.example.nfccardmanager.data.Card
        import com.example.nfccardmanager.databinding.ItemCardBinding

        class CardAdapter(
            private val onItemClick: (Card) -> Unit
        ) : ListAdapter<Card, CardAdapter.CardViewHolder>(CardDiffCallback()) {

            override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): CardViewHolder {
                val binding = ItemCardBinding.inflate(LayoutInflater.from(parent.context), parent, false)
                return CardViewHolder(binding)
            }

            override fun onBindViewHolder(holder: CardViewHolder, position: Int) {
                holder.bind(getItem(position))
            }

            inner class CardViewHolder(private val binding: ItemCardBinding) : RecyclerView.ViewHolder(binding.root) {
                init {
                    binding.root.setOnClickListener {
                        val position = adapterPosition
                        if (position != RecyclerView.NO_POSITION) {
                            onItemClick(getItem(position))
                        }
                    }
                }

                fun bind(card: Card) {
                    binding.textViewUid.text = card.uid
                    binding.textViewType.text = card.type
                }
            }

            class CardDiffCallback : DiffUtil.ItemCallback<Card>() {
                override fun areItemsTheSame(oldItem: Card, newItem: Card) = oldItem.id == newItem.id
                override fun areContentsTheSame(oldItem: Card, newItem: Card) = oldItem == newItem
            }
        }
        EOF

    - name: Create UI Activities
      run: |
        cat > app/src/main/java/com/example/nfccardmanager/ui/MainActivity.kt << 'EOF'
        package com.example.nfccardmanager.ui

        import android.content.Intent
        import android.os.Bundle
        import androidx.activity.viewModels
        import androidx.appcompat.app.AppCompatActivity
        import androidx.lifecycle.lifecycleScope
        import androidx.recyclerview.widget.LinearLayoutManager
        import com.example.nfccardmanager.adapter.CardAdapter
        import com.example.nfccardmanager.databinding.ActivityMainBinding
        import com.example.nfccardmanager.viewmodel.CardViewModel
        import kotlinx.coroutines.launch

        class MainActivity : AppCompatActivity() {
            private lateinit var binding: ActivityMainBinding
            private val viewModel: CardViewModel by viewModels()
            private lateinit var adapter: CardAdapter

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                binding = ActivityMainBinding.inflate(layoutInflater)
                setContentView(binding.root)

                setupRecyclerView()

                binding.fabAdd.setOnClickListener {
                    startActivity(Intent(this, ScanActivity::class.java))
                }
            }

            private fun setupRecyclerView() {
                adapter = CardAdapter { card ->
                    val intent = Intent(this, CardDetailActivity::class.java)
                    intent.putExtra("CARD_UID", card.uid)
                    startActivity(intent)
                }

                binding.recyclerView.layoutManager = LinearLayoutManager(this)
                binding.recyclerView.adapter = adapter

                lifecycleScope.launch {
                    viewModel.allCards.collect { cards ->
                        adapter.submitList(cards)
                    }
                }
            }
        }
        EOF

        cat > app/src/main/java/com/example/nfccardmanager/ui/ScanActivity.kt << 'EOF'
        package com.example.nfccardmanager.ui

        import android.app.PendingIntent
        import android.content.Intent
        import android.nfc.NfcAdapter
        import android.nfc.Tag
        import android.nfc.tech.MifareClassic
        import android.nfc.tech.MifareUltralight
        import android.os.Bundle
        import android.widget.Toast
        import androidx.activity.viewModels
        import androidx.appcompat.app.AppCompatActivity
        import com.example.nfccardmanager.data.Card
        import com.example.nfccardmanager.databinding.ActivityScanBinding
        import com.example.nfccardmanager.viewmodel.CardViewModel
        import kotlinx.coroutines.CoroutineScope
        import kotlinx.coroutines.Dispatchers
        import kotlinx.coroutines.flow.first
        import kotlinx.coroutines.launch

        class ScanActivity : AppCompatActivity() {
            private lateinit var binding: ActivityScanBinding
            private lateinit var nfcAdapter: NfcAdapter
            private lateinit var pendingIntent: PendingIntent
            private val viewModel: CardViewModel by viewModels()

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                binding = ActivityScanBinding.inflate(layoutInflater)
                setContentView(binding.root)

                nfcAdapter = NfcAdapter.getDefaultAdapter(this)
                pendingIntent = PendingIntent.getActivity(
                    this, 0, Intent(this, javaClass).addFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP),
                    PendingIntent.FLAG_MUTABLE
                )
            }

            override fun onResume() {
                super.onResume()
                nfcAdapter.enableForegroundDispatch(this, pendingIntent, null, null)
            }

            override fun onPause() {
                super.onPause()
                nfcAdapter.disableForegroundDispatch(this)
            }

            override fun onNewIntent(intent: Intent) {
                super.onNewIntent(intent)
                if (intent.action == NfcAdapter.ACTION_TAG_DISCOVERED) {
                    val tag = intent.getParcelableExtra<Tag>(NfcAdapter.EXTRA_TAG)
                    tag?.let { readTag(it) }
                }
            }

            private fun readTag(tag: Tag) {
                CoroutineScope(Dispatchers.IO).launch {
                    try {
                        when {
                            MifareClassic::class.java.name in tag.techList -> readMifareClassic(tag)
                            MifareUltralight::class.java.name in tag.techList -> readMifareUltralight(tag)
                            else -> runOnUiThread {
                                Toast.makeText(this@ScanActivity, "Неподдерживаемый тип", Toast.LENGTH_SHORT).show()
                            }
                        }
                    } catch (e: Exception) {
                        runOnUiThread {
                            Toast.makeText(this@ScanActivity, "Ошибка: ${e.message}", Toast.LENGTH_SHORT).show()
                        }
                    }
                }
            }

            private suspend fun readMifareClassic(tag: Tag) {
                val mc = MifareClassic.get(tag)
                try {
                    mc.connect()
                    val data = mutableListOf<ByteArray>()
                    for (sector in 0 until minOf(4, mc.sectorCount)) {
                        if (mc.authenticateSectorWithKeyA(sector, MifareClassic.KEY_DEFAULT)) {
                            for (block in 0 until mc.getBlockCountInSector(sector)) {
                                data.add(mc.readBlock(mc.sectorToBlock(sector) + block))
                            }
                        }
                    }
                    saveCard(tag.id.toHexString(), "Mifare Classic", data.flatMap { it.toList() }.toByteArray())
                } finally {
                    mc.close()
                }
            }

            private suspend fun readMifareUltralight(tag: Tag) {
                val mu = MifareUltralight.get(tag)
                try {
                    mu.connect()
                    val data = (0..3).map { mu.readPages(it) }
                    saveCard(tag.id.toHexString(), "Mifare Ultralight", data.flatMap { it.toList() }.toByteArray())
                } finally {
                    mu.close()
                }
            }

            private suspend fun saveCard(uid: String, type: String, data: ByteArray) {
                val exists = viewModel.allCards.first().any { it.uid == uid }
                if (exists) {
                    runOnUiThread { Toast.makeText(this@ScanActivity, "Карта уже существует", Toast.LENGTH_SHORT).show() }
                    return
                }
                viewModel.insert(Card(uid = uid, type = type, data = data))
                runOnUiThread {
                    Toast.makeText(this@ScanActivity, "Карта сохранена", Toast.LENGTH_SHORT).show()
                    finish()
                }
            }

            private fun ByteArray.toHexString() = joinToString("") { "%02x".format(it) }
        }
        EOF

        cat > app/src/main/java/com/example/nfccardmanager/ui/CardDetailActivity.kt << 'EOF'
        package com.example.nfccardmanager.ui

        import android.os.Bundle
        import android.widget.Toast
        import androidx.activity.viewModels
        import androidx.appcompat.app.AlertDialog
        import androidx.appcompat.app.AppCompatActivity
        import androidx.lifecycle.lifecycleScope
        import com.example.nfccardmanager.data.Card
        import com.example.nfccardmanager.hce.CardEmulationService
        import com.example.nfccardmanager.viewmodel.CardViewModel
        import kotlinx.coroutines.launch
        import java.text.SimpleDateFormat
        import java.util.*

        class CardDetailActivity : AppCompatActivity() {
            private val viewModel: CardViewModel by viewModels()

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                val uid = intent.getStringExtra("CARD_UID") ?: run { finish(); return }

                lifecycleScope.launch {
                    viewModel.allCards.collect { cards ->
                        val card = cards.find { it.uid == uid }
                        if (card != null) showCardDetails(card) else finish()
                    }
                }
            }

            private fun showCardDetails(card: Card) {
                val date = SimpleDateFormat("dd/MM/yyyy HH:mm", Locale.getDefault()).format(Date(card.timestamp))
                AlertDialog.Builder(this)
                    .setTitle("UID: ${card.uid}")
                    .setMessage("Тип: ${card.type}\nДата: $date")
                    .setPositiveButton("Эмулировать") { _, _ -> startEmulation(card) }
                    .setNegativeButton("Удалить") { _, _ -> confirmDelete(card) }
                    .setNeutralButton("Закрыть", null)
                    .show()
            }

            private fun startEmulation(card: Card) {
                CardEmulationService.emulatedCardData = card.data
                Toast.makeText(this, "Эмуляция активна", Toast.LENGTH_SHORT).show()
            }

            private fun confirmDelete(card: Card) {
                AlertDialog.Builder(this)
                    .setTitle("Удалить карту?")
                    .setPositiveButton("Да") { _, _ ->
                        viewModel.delete(card)
                        Toast.makeText(this, "Карта удалена", Toast.LENGTH_SHORT).show()
                        finish()
                    }
                    .setNegativeButton("Отмена", null)
                    .show()
            }
        }
        EOF

    - name: Create Icon
      run: |
        cat > app/src/main/res/mipmap-hdpi/ic_launcher.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <path android:fillColor="#6200EE" android:pathData="M0,0h108v108h-108z"/>
        </vector>
        EOF

    - name: Download Gradle Wrapper JAR
      run: |
        mkdir -p gradle/wrapper
        curl -sL "https://github.com/gradle/gradle/raw/v8.0.0/gradle/wrapper/gradle-wrapper.jar" \
          -o gradle/wrapper/gradle-wrapper.jar

    - name: Build Project
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

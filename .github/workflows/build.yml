# .github/workflows/build.yml
name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Check project structure
      run: |
        echo "Current working directory: $(pwd)"
        echo "Root directory contents:"
        ls -la
        echo "Parent directory contents:"
        ls -la ..
        echo "Finding all build files:"
        find . -name "build.gradle*" -o -name "settings.gradle*" -o -name "gradlew*" 2>/dev/null || echo "No Gradle files found"

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.0

    - name: Change to correct directory and build
      run: |
        # Find the actual project root directory
        PROJECT_ROOT=$(find . -name "settings.gradle*" -o -name "settings.gradle.kts" 2>/dev/null | head -1 | xargs dirname)
        if [ -z "$PROJECT_ROOT" ] || [ "$PROJECT_ROOT" = "." ]; then
          PROJECT_ROOT="."
        else
          PROJECT_ROOT=$(dirname "$PROJECT_ROOT")
        fi
        
        echo "Project root appears to be: $PROJECT_ROOT"
        cd "$PROJECT_ROOT"
        
        # Check if gradlew exists
        if [ -f "gradlew" ]; then
          echo "Found gradlew, making it executable and using it"
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
        else
          echo "No gradlew found, checking if we can build directly"
          # List what we have
          ls -la
          # If there are build files, try to build
          if ls build.gradle* >/dev/null 2>&1; then
            echo "Found build files, attempting to build with gradle"
            gradle assembleDebug --stacktrace
          else
            echo "No build files found, cannot build"
            exit 1
          fi
        fi

    - name: Run tests and lint
      run: |
        PROJECT_ROOT=$(find . -name "settings.gradle*" -o -name "settings.gradle.kts" 2>/dev/null | head -1 | xargs dirname)
        if [ -z "$PROJECT_ROOT" ] || [ "$PROJECT_ROOT" = "." ]; then
          PROJECT_ROOT="."
        else
          PROJECT_ROOT=$(dirname "$PROJECT_ROOT")
        fi
        
        cd "$PROJECT_ROOT"
        
        if [ -f "gradlew" ]; then
          ./gradlew testDebugUnitTest --stacktrace
          ./gradlew lintDebug --stacktrace
        else
          gradle testDebugUnitTest --stacktrace
          gradle lintDebug --stacktrace
        fi

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/reports/
          **/build/test-results/
        retention-days: 7

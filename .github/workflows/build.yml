package com.example.nfccardmanager.ui

import android.app.PendingIntent
import android.content.Intent
import android.nfc.NfcAdapter
import android.nfc.Tag
import android.nfc.tech.MifareClassic
import android.nfc.tech.MifareUltralight
import android.os.Bundle
import android.widget.Toast
import androidx.activity.viewModels
import androidx.appcompat.app.AppCompatActivity
import com.example.nfccardmanager.data.Card
import com.example.nfccardmanager.databinding.ActivityScanBinding
import com.example.nfccardmanager.viewmodel.CardViewModel
import kotlinx.coroutines.CoroutineScope
import kotlinx.coroutines.Dispatchers
import kotlinx.coroutines.launch

class ScanActivity : AppCompatActivity() {
    private lateinit var binding: ActivityScanBinding
    private lateinit var nfcAdapter: NfcAdapter
    private lateinit var pendingIntent: PendingIntent
    private val viewModel: CardViewModel by viewModels()

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        binding = ActivityScanBinding.inflate(layoutInflater)
        setContentView(binding.root)

        nfcAdapter = NfcAdapter.getDefaultAdapter(this)
        
        pendingIntent = PendingIntent.getActivity(
            this, 0, Intent(this, javaClass).addFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP),
            PendingIntent.FLAG_MUTABLE
        )
    }

    override fun onResume() {
        super.onResume()
        nfcAdapter.enableForegroundDispatch(this, pendingIntent, null, null)
    }

    override fun onPause() {
        super.onPause()
        nfcAdapter.disableForegroundDispatch(this)
    }

    override fun onNewIntent(intent: Intent) {
        super.onNewIntent(intent)
        if (intent.action == NfcAdapter.ACTION_TAG_DISCOVERED ||
            intent.action == NfcAdapter.ACTION_TECH_DISCOVERED) {
            val tag = intent.getParcelableExtra<Tag>(NfcAdapter.EXTRA_TAG)
            tag?.let { readTag(it) }
        }
    }

    private fun readTag(tag: Tag) {
        CoroutineScope(Dispatchers.IO).launch {
            try {
                when {
                    MifareClassic::class.java.name in tag.techList -> {
                        readMifareClassic(tag)
                    }
                    MifareUltralight::class.java.name in tag.techList -> {
                        readMifareUltralight(tag)
                    }
                    else -> {
                        runOnUiThread {
                            Toast.makeText(this@ScanActivity, "Неподдерживаемый тип карты", Toast.LENGTH_SHORT).show()
                        }
                    }
                }
            } catch (e: Exception) {
                runOnUiThread {
                    Toast.makeText(this@ScanActivity, "Ошибка чтения: ${e.message}", Toast.LENGTH_SHORT).show()
                }
            }
        }
    }

    private suspend fun readMifareClassic(tag: Tag) {
        val mifareClassic = MifareClassic.get(tag)
        try {
            mifareClassic.connect()
            val data = mutableListOf<ByteArray>()
            for (sector in 0 until minOf(4, mifareClassic.sectorCount)) {
                if (mifareClassic.authenticateSectorWithKeyA(sector, MifareClassic.KEY_DEFAULT)) {
                    for (block in 0 until mifareClassic.getBlockCountInSector(sector)) {
                        val blockIndex = mifareClassic.sectorToBlock(sector) + block
                        data.add(mifareClassic.readBlock(blockIndex))
                    }
                }
            }
            val allData = data.flatMap { it.toList() }.toByteArray()
            saveCard(tag.id.toHexString(), "Mifare Classic", allData)
            mifareClassic.close()
        } catch (e: Exception) {
            mifareClassic.close()
            throw e
        }
    }

    private suspend fun readMifareUltralight(tag: Tag) {
        val ultralight = MifareUltralight.get(tag)
        try {
            ultralight.connect()
            val data = mutableListOf<ByteArray>()
            for (page in 0..3) {
                data.add(ultralight.readPages(page))
            }
            val allData = data.flatMap { it.toList() }.toByteArray()
            saveCard(tag.id.toHexString(), "Mifare Ultralight", allData)
            ultralight.close()
        } catch (e: Exception) {
            ultralight.close()
            throw e
        }
    }

    private suspend fun saveCard(uid: String, type: String, data: ByteArray) {
        val existingCard = viewModel.allCards.value?.find { it.uid == uid }
        if (existingCard != null) {
            runOnUiThread {
                Toast.makeText(this@ScanActivity, "Карта уже существует", Toast.LENGTH_SHORT).show()
            }
            return
        }
        
        val card = Card(uid = uid, type = type, data = data)
        viewModel.insert(card)
        
        runOnUiThread {
            Toast.makeText(this@ScanActivity, "Карта сохранена", Toast.LENGTH_SHORT).show()
            finish()
        }
    }

    private fun ByteArray.toHexString(): String {
        return joinToString("") { "%02x".format(it) }
    }
}

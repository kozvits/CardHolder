# .github/workflows/build.yml
name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Check project structure
      run: |
        echo "Current working directory: $(pwd)"
        echo "Root directory contents:"
        ls -la
        echo "Finding all Gradle related files:"
        find . -name "*gradle*" -type f 2>/dev/null || echo "No Gradle files found"

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Build Project
      run: |
        echo "Searching for project root..."
        # Look for settings.gradle or build.gradle to find the actual project root
        SETTINGS_FILE=$(find . -name "settings.gradle*" -type f -print -quit 2>/dev/null)
        
        if [ -n "$SETTINGS_FILE" ]; then
          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "Found settings file at: $SETTINGS_FILE"
          echo "Project directory: $PROJECT_DIR"
          cd "$PROJECT_DIR"
        else
          BUILD_FILE=$(find . -name "build.gradle*" -type f -print -quit 2>/dev/null)
          if [ -n "$BUILD_FILE" ]; then
            PROJECT_DIR=$(dirname "$BUILD_FILE")
            echo "Found build file at: $BUILD_FILE"
            echo "Project directory: $PROJECT_DIR"
            cd "$PROJECT_DIR"
          fi
        fi
        
        echo "Current directory contents:"
        ls -la
        
        # Check for gradlew first
        if [ -f "./gradlew" ]; then
          echo "Using gradlew wrapper"
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
        elif [ -f "../gradlew" ]; then
          echo "Using gradlew wrapper from parent directory"
          chmod +x ../gradlew
          cd ..
          ./gradlew assembleDebug --stacktrace
        else
          echo "No gradlew found, trying direct gradle command"
          gradle assembleDebug --stacktrace
        fi

    - name: Run Tests and Lint
      run: |
        # Find and navigate to the correct directory again
        SETTINGS_FILE=$(find . -name "settings.gradle*" -type f -print -quit 2>/dev/null)
        if [ -n "$SETTINGS_FILE" ]; then
          cd "$(dirname "$SETTINGS_FILE")"
        else
          BUILD_FILE=$(find . -name "build.gradle*" -type f -print -quit 2>/dev/null)
          if [ -n "$BUILD_FILE" ]; then
            cd "$(dirname "$BUILD_FILE")"
          fi
        fi
        
        # Run tests and lint
        if [ -f "./gradlew" ]; then
          ./gradlew testDebugUnitTest --stacktrace
          ./gradlew lintDebug --stacktrace
        else
          gradle testDebugUnitTest --stacktrace
          gradle lintDebug --stacktrace
        fi

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/reports/
          **/build/test-results/
        retention-days: 7

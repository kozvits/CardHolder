name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Gradle Setup
      run: |
        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }

        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }

        rootProject.name = "CardHolder"
        include(":app")
        EOF

        cat > gradle.properties << 'EOF'
        android.useAndroidX=true
        android.enableJetifier=true
        android.suppressUnsupportedCompileSdk=34
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        org.gradle.parallel=true
        EOF

        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
        networkTimeout=10000
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

        cat > gradlew << 'EOF'
        #!/bin/sh
        app_path=$0
        while [ -h "$app_path" ]; do
            ls=$( ls -ld "$app_path" )
            link=${ls#*' -> '}
            case $link in
              /*) app_path=$link ;;
              *) app_path=${app_path%/*}/$link ;;
            esac
        done
        APP_BASE_NAME=${0##*/}
        APP_HOME=$( cd "${APP_HOME:-./}" > /dev/null && pwd -P ) || exit
        CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
        JAVACMD=java
        set -- \
            "-Dorg.gradle.appname=$APP_BASE_NAME" \
            -classpath "$CLASSPATH" \
            org.gradle.wrapper.GradleWrapperMain \
            "$@"
        exec "$JAVACMD" "$@"
        EOF

        chmod +x gradlew

    - name: Create build.gradle.kts (root)
      run: |
        cat > build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application") version "8.1.0" apply false
            id("org.jetbrains.kotlin.android") version "1.9.0" apply false
        }
        EOF

    - name: Create app/build.gradle.kts
      run: |
        mkdir -p app
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }

        android {
            namespace = "com.example.nfccardmanager"
            compileSdk = 34

            defaultConfig {
                applicationId = "com.example.nfccardmanager"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }

            buildTypes {
                release {
                    isMinifyEnabled = false
                }
            }

            buildFeatures {
                viewBinding = true
            }

            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }

            kotlinOptions {
                jvmTarget = "17"
            }
        }

        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.appcompat:appcompat:1.6.1")
            implementation("com.google.android.material:material:1.11.0")
            implementation("androidx.constraintlayout:constraintlayout:2.1.4")
            implementation("androidx.recyclerview:recyclerview:1.3.2")
            implementation("androidx.cardview:cardview:1.0.0")
            implementation("androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0")
            implementation("androidx.lifecycle:lifecycle-livedata-ktx:2.7.0")
            implementation("androidx.room:room-runtime:2.6.1")
            implementation("androidx.room:room-ktx:2.6.1")
            annotationProcessor("androidx.room:room-compiler:2.6.1")
            implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")
        }
        EOF

    - name: Create Directory Structure
      run: |
        mkdir -p app/src/main/java/com/example/nfccardmanager/{data,repository,viewmodel,ui,hce,adapter}
        mkdir -p app/src/main/res/{xml,values,layout,mipmap-hdpi,drawable}

    - name: Create AndroidManifest.xml
      run: |
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">

            <uses-permission android:name="android.permission.NFC" />
            <uses-feature android:name="android.hardware.nfc" android:required="true" />

            <application
                android:allowBackup="true"
                android:label="@string/app_name">

                <activity android:name=".ui.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <activity android:name=".ui.ScanActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.nfc.action.TAG_DISCOVERED" />
                    </intent-filter>
                </activity>

                <activity android:name=".ui.CardDetailActivity" />

                <service
                    android:name=".hce.CardEmulationService"
                    android:exported="true"
                    android:permission="android.permission.BIND_NFC_SERVICE">
                    <intent-filter>
                        <action android:name="android.nfc.cardemulation.action.HOST_APDU_SERVICE" />
                    </intent-filter>
                    <meta-data
                        android:name="android.nfc.cardemulation.host_apdu_service"
                        android:resource="@xml/aid_list" />
                </service>
            </application>
        </manifest>
        EOF


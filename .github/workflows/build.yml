# .github/workflows/build.yml
name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Debug project structure
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== Root directory contents ==="
        ls -la
        echo "=== All files in repository ==="
        find . -type f | sort
        echo "=== Looking for Gradle files ==="
        find . -name "*.gradle*" -o -name "gradlew*" 2>/dev/null || echo "No Gradle files found"

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Build Project
      run: |
        echo "=== Attempting to build project ==="
        
        # Find the correct directory containing build files
        BUILD_DIR_FOUND=false
        
        # Look for settings.gradle in current and parent directories
        for dir in . .. ../..; do
          if [ -f "$dir/settings.gradle" ] || [ -f "$dir/settings.gradle.kts" ]; then
            echo "Found settings.gradle in $dir"
            cd "$dir"
            BUILD_DIR_FOUND=true
            break
          fi
        done
        
        # If no settings.gradle found, look for build.gradle
        if [ "$BUILD_DIR_FOUND" = false ]; then
          for dir in . .. ../..; do
            if [ -f "$dir/build.gradle" ] || [ -f "$dir/build.gradle.kts" ]; then
              echo "Found build.gradle in $dir"
              cd "$dir"
              BUILD_DIR_FOUND=true
              break
            fi
          done
        fi
        
        # If still not found, stay in current directory
        if [ "$BUILD_DIR_FOUND" = false ]; then
          echo "No build directory found, staying in current directory"
        fi
        
        echo "=== Current directory contents ==="
        ls -la
        
        # Check for gradlew
        if [ -f "./gradlew" ]; then
          echo "Using gradlew wrapper"
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
        elif [ -f "../gradlew" ]; then
          echo "Using gradlew from parent directory"
          chmod +x ../gradlew
          cd ..
          ./gradlew assembleDebug --stacktrace
        else
          echo "No gradlew found, trying gradle command"
          if command -v gradle &> /dev/null; then
            gradle assembleDebug --stacktrace
          else
            echo "No gradle command available"
            exit 1
          fi
        fi

    - name: Run Tests and Lint
      run: |
        echo "=== Running tests and lint ==="
        
        # Try to find the right directory again
        BUILD_DIR_FOUND=false
        for dir in . .. ../..; do
          if [ -f "$dir/settings.gradle" ] || [ -f "$dir/settings.gradle.kts" ] || [ -f "$dir/build.gradle" ] || [ -f "$dir/build.gradle.kts" ]; then
            cd "$dir"
            BUILD_DIR_FOUND=true
            break
          fi
        done
        
        if [ -f "./gradlew" ]; then
          ./gradlew testDebugUnitTest --stacktrace
          ./gradlew lintDebug --stacktrace
        elif [ -f "../gradlew" ]; then
          cd ..
          ./gradlew testDebugUnitTest --stacktrace
          ./gradlew lintDebug --stacktrace
        else
          if command -v gradle &> /dev/null; then
            gradle testDebugUnitTest --stacktrace
            gradle lintDebug --stacktrace
          fi
        fi

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/reports/
          **/build/test-results/
        retention-days: 7

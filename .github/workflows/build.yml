package com.example.nfccardmanager.ui

import android.nfc.cardemulation.CardEmulation
import android.os.Bundle
import android.widget.Toast
import androidx.activity.viewModels
import androidx.appcompat.app.AlertDialog
import androidx.appcompat.app.AppCompatActivity
import com.example.nfccardmanager.data.Card
import com.example.nfccardmanager.hce.CardEmulationService
import com.example.nfccardmanager.viewmodel.CardViewModel

class CardDetailActivity : AppCompatActivity() {
    private val viewModel: CardViewModel by viewModels()
    private var currentCard: Card? = null

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        
        val cardUid = intent.getStringExtra("CARD_UID")
        if (cardUid == null) {
            finish()
            return
        }

        viewModel.allCards.observe(this) { cards ->
            currentCard = cards.find { it.uid == cardUid }
            currentCard?.let { card ->
                showCardDetails(card)
            } ?: finish()
        }
    }

    private fun showCardDetails(card: Card) {
        AlertDialog.Builder(this)
            .setTitle("UID: ${card.uid}")
            .setMessage("Тип: ${card.type}\nДата: ${java.text.SimpleDateFormat("dd/MM/yyyy HH:mm", java.util.Locale.getDefault()).format(java.util.Date(card.timestamp))}")
            .setPositiveButton("Эмулировать") { _, _ ->
                startEmulation(card)
            }
            .setNegativeButton("Удалить") { _, _ ->
                confirmDelete(card)
            }
            .setNeutralButton("Закрыть", null)
            .show()
    }

    private fun startEmulation(card: Card) {
        CardEmulationService.emulatedCardData = card.data
        
        val cardEmulation = CardEmulation.getInstance(this)
        val service = android.content.ComponentName(this, CardEmulationService::class.java)
        
        if (cardEmulation.isDefaultServiceForCategory(service, CardEmulation.CATEGORY_OTHER)) {
            Toast.makeText(this, "Эмуляция активна", Toast.LENGTH_SHORT).show()
        } else {
            Toast.makeText(this, "Необходимо установить приложение как сервис по умолчанию", Toast.LENGTH_LONG).show()
        }
    }

    private fun confirmDelete(card: Card) {
        AlertDialog.Builder(this)
            .setTitle("Удалить карту?")
            .setMessage("Вы уверены, что хотите удалить эту карту?")
            .setPositiveButton("Да") { _, _ ->
                viewModel.delete(card)
                Toast.makeText(this, "Карта удалена", Toast.LENGTH_SHORT).show()
                finish()
            }
            .setNegativeButton("Отмена", null)
            .show()
    }
}

# .github/workflows/build.yml
name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Check project structure
      run: |
        echo "Current working directory: $(pwd)"
        echo "Root directory contents:"
        ls -la
        echo "All directories and files:"
        find . -type f -name "*.gradle*" | head -20
        echo "Looking for root project files:"
        find . -maxdepth 3 -name "settings.gradle*" -o -name "build.gradle*" 2>/dev/null

    - name: Find project root and setup
      run: |
        # Look for the main project root (where settings.gradle is)
        ROOT_DIR=$(find . -name "settings.gradle*" -type f -print -quit 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
        if [ -n "$ROOT_DIR" ] && [ "$ROOT_DIR" != "." ]; then
          PROJECT_ROOT=$(dirname "$ROOT_DIR")
          echo "Found project root at: $PROJECT_ROOT"
        else
          # Try to find any build.gradle in parent directories
          BUILD_FILE=$(find . -name "build.gradle*" -type f | grep -E "(^|/)build\.gradle" | head -1)
          if [ -n "$BUILD_FILE" ]; then
            PROJECT_ROOT=$(dirname "$BUILD_FILE")
            echo "Found build file at: $BUILD_FILE, project root: $PROJECT_ROOT"
          else
            PROJECT_ROOT="."
            echo "Using current directory as project root"
          fi
        fi
        echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Make gradlew executable if exists
      run: |
        cd "$PROJECT_ROOT"
        if [ -f "./gradlew" ]; then
          echo "Making gradlew executable"
          chmod +x ./gradlew
        elif [ -f "../gradlew" ]; then
          echo "Making ../gradlew executable"
          chmod +x ../gradlew
        fi

    - name: Build Project
      run: |
        cd "$PROJECT_ROOT"
        echo "Current directory: $(pwd)"
        echo "Contents:"
        ls -la
        
        # Try different approaches to build
        if [ -f "./gradlew" ]; then
          echo "Building with ./gradlew"
          ./gradlew assembleDebug --stacktrace
        elif [ -f "../gradlew" ]; then
          echo "Building with ../gradlew"
          cd ..
          ./gradlew assembleDebug --stacktrace
        elif [ -f "./gradle" ] || command -v gradle >/dev/null 2>&1; then
          echo "Building with gradle command"
          gradle assembleDebug --stacktrace
        else
          echo "Creating basic gradle wrapper"
          # Try to initialize gradle if nothing exists
          gradle init --type basic
          gradle assembleDebug --stacktrace
        fi

    - name: Run Tests
      run: |
        cd "$PROJECT_ROOT"
        if [ -f "./gradlew" ]; then
          ./gradlew testDebugUnitTest --stacktrace
        elif [ -f "../gradlew" ]; then
          cd ..
          ./gradlew testDebugUnitTest --stacktrace
        else
          gradle testDebugUnitTest --stacktrace
        fi

    - name: Run Lint
      run: |
        cd "$PROJECT_ROOT"
        if [ -f "./gradlew" ]; then
          ./gradlew lintDebug --stacktrace
        elif [ -f "../gradlew" ]; then
          cd ..
          ./gradlew lintDebug --stacktrace
        else
          gradle lintDebug --stacktrace
        fi

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/reports/
          **/build/test-results/
        retention-days: 7

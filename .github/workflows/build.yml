# .github/workflows/build.yml
name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Check project structure
      run: |
        echo "Current directory: $(pwd)"
        echo "Listing files:"
        ls -la
        echo "Looking for gradlew in parent directories:"
        find .. -name "gradlew" -type f 2>/dev/null || echo "No gradlew found"

    - name: Build with Gradle
      run: |
        # Try to find gradlew file
        if [ -f "gradlew" ]; then
          echo "Found gradlew in current directory"
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
        elif [ -f "../gradlew" ]; then
          echo "Found gradlew in parent directory"
          chmod +x ../gradlew
          cd ..
          ./gradlew assembleDebug --stacktrace
        else
          echo "Using gradle wrapper from PATH"
          gradle assembleDebug --stacktrace
        fi

    - name: Run lint checks
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew lintDebug --stacktrace
        elif [ -f "../gradlew" ]; then
          cd ..
          ./gradlew lintDebug --stacktrace
        else
          gradle lintDebug --stacktrace
        fi

    - name: Run unit tests
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew testDebugUnitTest --stacktrace
        elif [ -f "../gradlew" ]; then
          cd ..
          ./gradlew testDebugUnitTest --stacktrace
        else
          gradle testDebugUnitTest --stacktrace
        fi

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload lint reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-reports
        path: |
          **/build/reports/lint-results-debug.xml
        retention-days: 7

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          **/build/test-results/testDebugUnitTest/
          **/build/reports/tests/testDebugUnitTest/
        retention-days: 7

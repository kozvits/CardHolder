    - name: Create Kotlin Source Files
      run: |
        cat > app/src/main/java/com/example/nfccardmanager/data/Card.kt << 'KOTLINEOF'
package com.example.nfccardmanager.data

import androidx.room.Entity
import androidx.room.PrimaryKey

@Entity(tableName = "cards")
data class Card(
    @PrimaryKey(autoGenerate = true)
    val id: Int = 0,
    val uid: String,
    val type: String,
    val data: ByteArray,
    val timestamp: Long = System.currentTimeMillis()
) {
    override fun equals(other: Any?): Boolean {
        if (this === other) return true
        if (javaClass != other?.javaClass) return false
        other as Card
        if (id != other.id) return false
        if (uid != other.uid) return false
        if (type != other.type) return false
        if (!data.contentEquals(other.data)) return false
        if (timestamp != other.timestamp) return false
        return true
    }

    override fun hashCode(): Int {
        var result = id
        result = 31 * result + uid.hashCode()
        result = 31 * result + type.hashCode()
        result = 31 * result + data.contentHashCode()
        result = 31 * result + timestamp.hashCode()
        return result
    }
}
KOTLINEOF

        cat > app/src/main/java/com/example/nfccardmanager/data/CardDao.kt << 'KOTLINEOF'
package com.example.nfccardmanager.data

import androidx.room.*
import kotlinx.coroutines.flow.Flow

@Dao
interface CardDao {
    @Query("SELECT * FROM cards")
    fun getAllCards(): Flow<List<Card>>

    @Query("SELECT * FROM cards WHERE uid = :uid LIMIT 1")
    suspend fun getCardByUid(uid: String): Card?

    @Insert(onConflict = OnConflictStrategy.IGNORE)
    suspend fun insert(card: Card): Long

    @Delete
    suspend fun delete(card: Card)

    @Update
    suspend fun update(card: Card)
}
KOTLINEOF

        cat > app/src/main/java/com/example/nfccardmanager/data/CardDatabase.kt << 'KOTLINEOF'
package com.example.nfccardmanager.data

import android.content.Context
import androidx.room.Database
import androidx.room.Room
import androidx.room.RoomDatabase

@Database(entities = [Card::class], version = 1, exportSchema = false)
abstract class CardDatabase : RoomDatabase() {
    abstract fun cardDao(): CardDao

    companion object {
        @Volatile
        private var INSTANCE: CardDatabase? = null

        fun getDatabase(context: Context): CardDatabase {
            return INSTANCE ?: synchronized(this) {
                val instance = Room.databaseBuilder(
                    context.applicationContext,
                    CardDatabase::class.java,
                    "card_database"
                ).build()
                INSTANCE = instance
                instance
            }
        }
    }
}
KOTLINEOF

    - name: Create Repository and ViewModel
      run: |
        cat > app/src/main/java/com/example/nfccardmanager/repository/CardRepository.kt << 'KOTLINEOF'
package com.example.nfccardmanager.repository

import com.example.nfccardmanager.data.Card
import com.example.nfccardmanager.data.CardDao
import kotlinx.coroutines.Dispatchers
import kotlinx.coroutines.flow.Flow
import kotlinx.coroutines.withContext

class CardRepository(private val cardDao: CardDao) {
    val allCards: Flow<List<Card>> = cardDao.getAllCards()

    suspend fun getCardByUid(uid: String): Card? = withContext(Dispatchers.IO) {
        cardDao.getCardByUid(uid)
    }

    suspend fun insert(card: Card): Long = withContext(Dispatchers.IO) {
        cardDao.insert(card)
    }

    suspend fun delete(card: Card) = withContext(Dispatchers.IO) {
        cardDao.delete(card)
    }

    suspend fun update(card: Card) = withContext(Dispatchers.IO) {
        cardDao.update(card)
    }
}
KOTLINEOF

        cat > app/src/main/java/com/example/nfccardmanager/viewmodel/CardViewModel.kt << 'KOTLINEOF'
package com.example.nfccardmanager.viewmodel

import android.app.Application
import androidx.lifecycle.AndroidViewModel
import androidx.lifecycle.viewModelScope
import com.example.nfccardmanager.data.Card
import com.example.nfccardmanager.data.CardDatabase
import com.example.nfccardmanager.repository.CardRepository
import kotlinx.coroutines.flow.Flow
import kotlinx.coroutines.launch

class CardViewModel(application: Application) : AndroidViewModel(application) {
    private val repository: CardRepository

    init {
        val cardDao = CardDatabase.getDatabase(application).cardDao()
        repository = CardRepository(cardDao)
    }

    val allCards: Flow<List<Card>> = repository.allCards

    fun insert(card: Card) = viewModelScope.launch {
        repository.insert(card)
    }

    fun delete(card: Card) = viewModelScope.launch {
        repository.delete(card)
    }

    fun update(card: Card) = viewModelScope.launch {
        repository.update(card)
    }
}
KOTLINEOF

    - name: Create HCE Service
      run: |
        cat > app/src/main/java/com/example/nfccardmanager/hce/CardEmulationService.kt << 'KOTLINEOF'
package com.example.nfccardmanager.hce

import android.nfc.cardemulation.HostApduService
import android.os.Bundle
import android.util.Log

class CardEmulationService : HostApduService() {
    companion object {
        private const val TAG = "CardEmulationService"
        var emulatedCardData: ByteArray? = null
    }

    override fun processCommandApdu(commandApdu: ByteArray, extras: Bundle?): ByteArray {
        Log.d(TAG, "Received APDU: ${commandApdu.contentToString()}")
        
        emulatedCardData?.let {
            return it + byteArrayOf(0x90.toByte(), 0x00.toByte())
        }
        
        return byteArrayOf(0x6A.toByte(), 0x82.toByte())
    }

    override fun onDeactivated(reason: Int) {
        Log.d(TAG, "Card emulation deactivated, reason: $reason")
    }
}

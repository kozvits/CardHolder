# .github/workflows/build.yml
name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Settings Gradle
      run: |
        echo "pluginManagement {" > settings.gradle.kts
        echo "    repositories {" >> settings.gradle.kts
        echo "        google()" >> settings.gradle.kts
        echo "        mavenCentral()" >> settings.gradle.kts
        echo "        gradlePluginPortal()" >> settings.gradle.kts
        echo "    }" >> settings.gradle.kts
        echo "}" >> settings.gradle.kts
        echo "" >> settings.gradle.kts
        echo "dependencyResolutionManagement {" >> settings.gradle.kts
        echo "    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)" >> settings.gradle.kts
        echo "    repositories {" >> settings.gradle.kts
        echo "        google()" >> settings.gradle.kts
        echo "        mavenCentral()" >> settings.gradle.kts
        echo "    }" >> settings.gradle.kts
        echo "}" >> settings.gradle.kts
        echo "" >> settings.gradle.kts
        echo 'rootProject.name = "CardHolder"' >> settings.gradle.kts
        echo 'include(":app")' >> settings.gradle.kts

    - name: Create Gradle Properties
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
        echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> gradle.properties
        echo "org.gradle.parallel=true" >> gradle.properties

    - name: Create Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https://services.gradle.org/distributions/gradle-8.0-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

    - name: Create Gradlew Script
      run: |
        echo "#!/bin/sh" > gradlew
        echo "app_path="'$0' >> gradlew
        echo "while [ -h "'$app_path'" ]; do" >> gradlew
        echo "    ls=$( ls -ld "'$app_path'" )" >> gradlew
        echo '    link=${ls#*'"'"' -> '"'"'}' >> gradlew
        echo "    case "'$link'" in" >> gradlew
        echo "      /*) app_path="'$link'" ;;" >> gradlew
        echo "      *) app_path="'$'{app_path%/*}/$'link'" ;;" >> gradlew
        echo "    esac" >> gradlew
        echo "done" >> gradlew
        echo 'APP_BASE_NAME=${0##*/}' >> gradlew
        echo 'APP_HOME=$( cd "${APP_HOME:-./}" > /dev/null && pwd -P ) || exit' >> gradlew
        echo 'CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar' >> gradlew
        echo 'JAVACMD=java' >> gradlew
        echo 'set -- \' >> gradlew
        echo '    "-Dorg.gradle.appname=$APP_BASE_NAME" \' >> gradlew
        echo '    -classpath "$CLASSPATH" \' >> gradlew
        echo '    org.gradle.wrapper.GradleWrapperMain \' >> gradlew
        echo '    "$@"' >> gradlew
        echo 'exec "$JAVACMD" "$@"' >> gradlew
        chmod +x gradlew

    - name: Create aid_list.xml
      run: |
        mkdir -p app/src/main/res/xml
        echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/xml/aid_list.xml
        echo '<host-apdu-service xmlns:android="http://schemas.android.com/apk/res/android"' >> app/src/main/res/xml/aid_list.xml
        echo '    android:description="@string/app_name"' >> app/src/main/res/xml/aid_list.xml
        echo '    android:requireDeviceUnlock="false">' >> app/src/main/res/xml/aid_list.xml
        echo '    <aid-group android:description="@string/app_name"' >> app/src/main/res/xml/aid_list.xml
        echo '        android:category="other">' >> app/src/main/res/xml/aid_list.xml
        echo '        <aid-filter android:name="F2222222222222"/>' >> app/src/main/res/xml/aid_list.xml
        echo '    </aid-group>' >> app/src/main/res/xml/aid_list.xml
        echo '</host-apdu-service>' >> app/src/main/res/xml/aid_list.xml

    - name: Build Project
      run: ./gradlew assembleDebug --stacktrace

    - name: Run Tests
      run: ./gradlew testDebugUnitTest --stacktrace

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

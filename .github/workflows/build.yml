# .github/workflows/build.yml
name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Settings Gradle
      run: |
        echo 'pluginManagement {' > settings.gradle.kts
        echo '    repositories {' >> settings.gradle.kts
        echo '        google()' >> settings.gradle.kts
        echo '        mavenCentral()' >> settings.gradle.kts
        echo '        gradlePluginPortal()' >> settings.gradle.kts
        echo '    }' >> settings.gradle.kts
        echo '}' >> settings.gradle.kts
        echo '' >> settings.gradle.kts
        echo 'dependencyResolutionManagement {' >> settings.gradle.kts
        echo '    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)' >> settings.gradle.kts
        echo '    repositories {' >> settings.gradle.kts
        echo '        google()' >> settings.gradle.kts
        echo '        mavenCentral()' >> settings.gradle.kts
        echo '    }' >> settings.gradle.kts
        echo '}' >> settings.gradle.kts
        echo '' >> settings.gradle.kts
        echo 'rootProject.name = "CardHolder"' >> settings.gradle.kts
        echo 'include(":app")' >> settings.gradle.kts

    - name: Create Gradle Wrapper Properties
      run: |
        mkdir -p gradle/wrapper
        printf 'distributionBase=GRADLE_USER_HOME\n' > gradle/wrapper/gradle-wrapper.properties
        printf 'distributionPath=wrapper/dists\n' >> gradle/wrapper/gradle-wrapper.properties
        printf 'distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0-bin.zip\n' >> gradle/wrapper/gradle-wrapper.properties
        printf 'networkTimeout=10000\n' >> gradle/wrapper/gradle-wrapper.properties
        printf 'zipStoreBase=GRADLE_USER_HOME\n' >> gradle/wrapper/gradle-wrapper.properties
        printf 'zipStorePath=wrapper/dists\n' >> gradle/wrapper/gradle-wrapper.properties

    - name: Create Gradlew Script
      run: |
        printf '#!/bin/sh\n' > gradlew
        printf 'app_path=$0\n' >> gradlew
        printf 'while [ -h "$app_path" ]; do\n' >> gradlew
        printf "    ls=\$( ls -ld \"\$app_path\" )\n" >> gradlew
        printf "    link=\${ls#*' -> '}\n" >> gradlew
        printf '    case $link in\n' >> gradlew
        printf '      /*) app_path=$link ;;\n' >> gradlew
        printf '      *) app_path=${app_path%/*}/$link ;;\n' >> gradlew
        printf '    esac\n' >> gradlew
        printf 'done\n' >> gradlew
        printf 'APP_BASE_NAME=${0##*/}\n' >> gradlew
        printf 'APP_HOME=$( cd "${APP_HOME:-./}" > /dev/null && pwd -P ) || exit\n' >> gradlew
        printf 'CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar\n' >> gradlew
        printf 'JAVACMD=java\n' >> gradlew
        printf 'set -- \\\n' >> gradlew
        printf '    "-Dorg.gradle.appname=$APP_BASE_NAME" \\\n' >> gradlew
        printf '    -classpath "$CLASSPATH" \\\n' >> gradlew
        printf '    org.gradle.wrapper.GradleWrapperMain \\\n' >> gradlew
        printf '    "$@"\n' >> gradlew
        printf 'exec "$JAVACMD" "$@"\n' >> gradlew
        chmod +x gradlew

    - name: Build Project
      run: ./gradlew assembleDebug --stacktrace

    - name: Run Tests
      run: ./gradlew testDebugUnitTest --stacktrace

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

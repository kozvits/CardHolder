# .github/workflows/build.yml
name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Settings Gradle
      run: |
        echo "pluginManagement {" > settings.gradle.kts
        echo "    repositories {" >> settings.gradle.kts
        echo "        google()" >> settings.gradle.kts
        echo "        mavenCentral()" >> settings.gradle.kts
        echo "        gradlePluginPortal()" >> settings.gradle.kts
        echo "    }" >> settings.gradle.kts
        echo "}" >> settings.gradle.kts
        echo "" >> settings.gradle.kts
        echo "dependencyResolutionManagement {" >> settings.gradle.kts
        echo "    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)" >> settings.gradle.kts
        echo "    repositories {" >> settings.gradle.kts
        echo "        google()" >> settings.gradle.kts
        echo "        mavenCentral()" >> settings.gradle.kts
        echo "    }" >> settings.gradle.kts
        echo "}" >> settings.gradle.kts
        echo "" >> settings.gradle.kts
        echo 'rootProject.name = "CardHolder"' >> settings.gradle.kts
        echo 'include(":app")' >> settings.gradle.kts

    - name: Create Gradle Properties
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
        echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> gradle.properties
        echo "org.gradle.parallel=true" >> gradle.properties

    - name: Create Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https://services.gradle.org/distributions/gradle-8.0-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

    - name: Create Gradlew Script
      run: |
        echo "#!/bin/sh" > gradlew
        echo "app_path="'$0' >> gradlew
        echo "while [ -h "'$app_path'" ]; do" >> gradlew
        echo "    ls=$( ls -ld "'$app_path'" )" >> gradlew
        echo '    link=${ls#*'"'"' -> '"'"'}' >> gradlew
        echo "    case "'$link'" in" >> gradlew
        echo "      /*) app_path="'$link'" ;;" >> gradlew
        echo "      *) app_path="'$'{app_path%/*}/$'link'" ;;" >> gradlew
        echo "    esac" >> gradlew
        echo "done" >> gradlew
        echo 'APP_BASE_NAME=${0##*/}' >> gradlew
        echo 'APP_HOME=$( cd "${APP_HOME:-./}" > /dev/null && pwd -P ) || exit' >> gradlew
        echo 'CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar' >> gradlew
        echo 'JAVACMD=java' >> gradlew
        echo 'set -- \' >> gradlew
        echo '    "-Dorg.gradle.appname=$APP_BASE_NAME" \' >> gradlew
        echo '    -classpath "$CLASSPATH" \' >> gradlew
        echo '    org.gradle.wrapper.GradleWrapperMain \' >> gradlew
        echo '    "$@"' >> gradlew
        echo 'exec "$JAVACMD" "$@"' >> gradlew
        chmod +x gradlew

    - name: Create AndroidManifest.xml
      run: |
        mkdir -p app/src/main/res/xml app/src/main/res/values app/src/main/res/mipmap-hdpi app/src/main/res/drawable
        echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/AndroidManifest.xml
        echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android">' >> app/src/main/AndroidManifest.xml
        echo '' >> app/src/main/AndroidManifest.xml
        echo '    <uses-permission android:name="android.permission.NFC" />' >> app/src/main/AndroidManifest.xml
        echo '    <uses-feature android:name="android.hardware.nfc" android:required="true" />' >> app/src/main/AndroidManifest.xml
        echo '' >> app/src/main/AndroidManifest.xml
        echo '    <application' >> app/src/main/AndroidManifest.xml
        echo '        android:allowBackup="true"' >> app/src/main/AndroidManifest.xml
        echo '        android:label="@string/app_name">' >> app/src/main/AndroidManifest.xml
        echo '' >> app/src/main/AndroidManifest.xml
        echo '        <activity android:name=".ui.MainActivity" android:exported="true">' >> app/src/main/AndroidManifest.xml
        echo '            <intent-filter>' >> app/src/main/AndroidManifest.xml
        echo '                <action android:name="android.intent.action.MAIN" />' >> app/src/main/AndroidManifest.xml
        echo '                <category android:name="android.intent.category.LAUNCHER" />' >> app/src/main/AndroidManifest.xml
        echo '            </intent-filter>' >> app/src/main/AndroidManifest.xml
        echo '        </activity>' >> app/src/main/AndroidManifest.xml
        echo '' >> app/src/main/AndroidManifest.xml
        echo '        <activity android:name=".ui.ScanActivity" android:exported="true">' >> app/src/main/AndroidManifest.xml
        echo '            <intent-filter>' >> app/src/main/AndroidManifest.xml
        echo '                <action android:name="android.nfc.action.TAG_DISCOVERED" />' >> app/src/main/AndroidManifest.xml
        echo '            </intent-filter>' >> app/src/main/AndroidManifest.xml
        echo '        </activity>' >> app/src/main/AndroidManifest.xml
        echo '' >> app/src/main/AndroidManifest.xml
        echo '        <activity android:name=".ui.CardDetailActivity" />' >> app/src/main/AndroidManifest.xml
        echo '' >> app/src/main/AndroidManifest.xml
        echo '        <service' >> app/src/main/AndroidManifest.xml
        echo '            android:name=".hce.CardEmulationService"' >> app/src/main/AndroidManifest.xml
        echo '            android:exported="true"' >> app/src/main/AndroidManifest.xml
        echo '            android:permission="android.permission.BIND_NFC_SERVICE">' >> app/src/main/AndroidManifest.xml
        echo '            <intent-filter>' >> app/src/main/AndroidManifest.xml
        echo '                <action android:name="android.nfc.cardemulation.action.HOST_APDU_SERVICE" />' >> app/src/main/AndroidManifest.xml
        echo '            </intent-filter>' >> app/src/main/AndroidManifest.xml
        echo '            <meta-data' >> app/src/main/AndroidManifest.xml
        echo '                android:name="android.nfc.cardemulation.host_apdu_service"' >> app/src/main/AndroidManifest.xml
        echo '                android:resource="@xml/aid_list" />' >> app/src/main/AndroidManifest.xml
        echo '        </service>' >> app/src/main/AndroidManifest.xml
        echo '    </application>' >> app/src/main/AndroidManifest.xml
        echo '</manifest>' >> app/src/main/AndroidManifest.xml

    - name: Create aid_list.xml
      run: |
        echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/xml/aid_list.xml
        echo '<host-apdu-service xmlns:android="http://schemas.android.com/apk/res/android"' >> app/src/main/res/xml/aid_list.xml
        echo '    android:description="@string/app_name"' >> app/src/main/res/xml/aid_list.xml
        echo '    android:requireDeviceUnlock="false">' >> app/src/main/res/xml/aid_list.xml
        echo '    <aid-group android:description="@string/app_name"' >> app/src/main/res/xml/aid_list.xml
        echo '        android:category="other">' >> app/src/main/res/xml/aid_list.xml
        echo '        <aid-filter android:name="F2222222222222"/>' >> app/src/main/res/xml/aid_list.xml
        echo '    </aid-group>' >> app/src/main/res/xml/aid_list.xml
        echo '</host-apdu-service>' >> app/src/main/res/xml/aid_list.xml

    - name: Create strings.xml
      run: |
        echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/strings.xml
        echo '<resources>' >> app/src/main/res/values/strings.xml
        echo '    <string name="app_name">NFC Card Manager</string>' >> app/src/main/res/values/strings.xml
        echo '    <string name="scan_instructions">Поднесите NFC карту к устройству</string>' >> app/src/main/res/values/strings.xml
        echo '</resources>' >> app/src/main/res/values/strings.xml

    - name: Create themes.xml
      run: |
        echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/themes.xml
        echo '<resources>' >> app/src/main/res/values/themes.xml
        echo '    <style name="AppTheme" parent="Theme.MaterialComponents.DayNight.DarkActionBar">' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorPrimary">@color/purple_500</item>' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorPrimaryVariant">@color/purple_700</item>' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorOnPrimary">@color/white</item>' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorSecondary">@color/teal_200</item>' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorSecondaryVariant">@color/teal_700</item>' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorOnSecondary">@color/black</item>' >> app/src/main/res/values/themes.xml
        echo '    </style>' >> app/src/main/res/values/themes.xml
        echo '</resources>' >> app/src/main/res/values/themes.xml

    - name: Create colors.xml
      run: |
        echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/colors.xml
        echo '<resources>' >> app/src/main/res/values/colors.xml
        echo '    <color name="purple_200">#FFBB86FC</color>' >> app/src/main/res/values/colors.xml
        echo '    <color name="purple_500">#FF6200EE</color>' >> app/src/main/res/values/colors.xml
        echo '    <color name="purple_700">#FF3700B3</color>' >> app/src/main/res/values/colors.xml
        echo '    <color name="teal_200">#FF03DAC5</color>' >> app/src/main/res/values/colors.xml
        echo '    <color name="teal_700">#FF018786</color>' >> app/src/main/res/values/colors.xml
        echo '    <color name="black">#FF000000</color>' >> app/src/main/res/values/colors.xml
        echo '    <color name="white">#FFFFFFFF</color>' >> app/src/main/res/values/colors.xml
        echo '</resources>' >> app/src/main/res/values/colors.xml

    - name: Create launcher icon
      run: |
        echo '<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">' > app/src/main/res/drawable/ic_launcher_foreground.xml
        echo '    <path android:fillColor="#6200EE" android:pathData="M0,0h108v108h-108z"/>' >> app/src/main/res/drawable/ic_launcher_foreground.xml
        echo '    <path android:fillColor="#FFFFFF" android:pathData="M54,30m-20,0a20,20 0,1 1,40 0a20,20 0,1 1,-40 0"/>' >> app/src/main/res/drawable/ic_launcher_foreground.xml
        echo '</vector>' >> app/src/main/res/drawable/ic_launcher_foreground.xml
        
        echo '<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">' > app/src/main/res/mipmap-hdpi/ic_launcher.xml
        echo '    <path android:fillColor="#6200EE" android:pathData="M0,0h108v108h-108z"/>' >> app/src/main/res/mipmap-hdpi/ic_launcher.xml
        echo '</vector>' >> app/src/main/res/mipmap-hdpi/ic_launcher.xml

    - name: Build Project
      run: ./gradlew assembleDebug --stacktrace

    - name: Run Tests
      run: ./gradlew testDebugUnitTest --stacktrace

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

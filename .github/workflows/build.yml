# .github/workflows/build.yml
name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Debug project structure
      run: find . -type f | sort

    - name: Create Gradle files
      run: |
        mkdir -p gradle/wrapper
        
        echo 'distributionBase=GRADLE_USER_HOME' > gradle/wrapper/gradle-wrapper.properties
        echo 'distributionPath=wrapper/dists' >> gradle/wrapper/gradle-wrapper.properties
        echo 'distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip' >> gradle/wrapper/gradle-wrapper.properties
        echo 'zipStoreBase=GRADLE_USER_HOME' >> gradle/wrapper/gradle-wrapper.properties
        echo 'zipStorePath=wrapper/dists' >> gradle/wrapper/gradle-wrapper.properties

        echo 'rootProject.name = "CardHolder"' > settings.gradle
        echo 'include ":app"' >> settings.gradle

    - name: Create gradlew
      run: |
        cat > gradlew << 'ENDOFFILE'
#!/bin/sh
app_path=$0
while [ -h "$app_path" ]; do
    ls=$( ls -ld "$app_path" )
    link=${ls#*' -> '}
    case $link in
      /*) app_path=$link ;;
      *) app_path=${app_path%/*}/$link ;;
    esac
done
APP_BASE_NAME=${0##*/}
APP_HOME=$( cd "${APP_HOME:-./}" > /dev/null && pwd -P ) || exit
CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
JAVACMD=java
DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'
set -- \
    "-Dorg.gradle.appname=$APP_BASE_NAME" \
    -classpath "$CLASSPATH" \
    org.gradle.wrapper.GradleWrapperMain \
    "$@"
exec "$JAVACMD" "$@"
ENDOFFILE

    - name: Make gradlew executable and setup
      run: |
        chmod +x gradlew
        mkdir -p gradle/wrapper
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Build Project
      run: ./gradlew assembleDebug --stacktrace

    - name: Run Tests
      run: ./gradlew testDebugUnitTest --stacktrace

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/reports/
          **/build/test-results/
        retention-days: 7
